
logging:
  level:
    root: error
    com.andrew.messenger.http.controllers: info
  file:
    name: userController.log
    path: /

minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  buckets:
    avatars: user-avatars
    chat-files: chat-attachments

mongodb:
  exe:
    path: "C:/mongoDB/mongodb-win32-x86_64-windows-8.2.5/bin/mongod.exe"
  data:
    path: "C:/data/db"

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/messenger
      auto-index-creation: true
  threads:
    virtual:
      enabled: true
  mvc:
    format:
      date: iso
    servlet:
      path: /
  application:
    name: messenger
  datasource:
    username: postgres
    password: postgres
    url: jdbc:postgresql://localhost:5432/messenger
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        hbm2ddl:
          auto: validate
        show_sql: true
        format_sql: true
    open-in-view: false

